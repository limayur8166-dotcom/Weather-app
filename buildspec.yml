version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: ap-south-1
    REPOSITORY_URI: 895850516918.dkr.ecr.ap-south-1.amazonaws.com/weather-app-17-04
    IMAGE_TAG: latest

phases:
  pre_build:
    commands:
      - echo ===== Logging into Amazon ECR =====
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin 895850516918.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo ===== Build Started =====
      - docker build -t weather-app-17-04 .
      - docker tag weather-app-17-04:$IMAGE_TAG $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo ===== Pushing Docker Image =====
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo ===== Creating imagedefinitions.json =====
      - printf '[{"name":"confident_goldberg","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json